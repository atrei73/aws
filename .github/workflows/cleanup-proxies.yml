name: Cleanup Stale Proxies

on:
  schedule:
    - cron: '*/15 * * * *'  # каждые 15 минут
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Get active runner IPs
        id: active
        run: |
          # Получаем список активных workflow runs
          RUNS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=in_progress&per_page=100")
          
          # Здесь нужна логика сопоставления IP и раннеров
          # Пока оставим заглушку
          echo "Active runs: $RUNS"
      
      - name: Update S3 with only active IPs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Скачиваем текущий список
          aws s3 cp s3://my-proxy-list-my-proxy-list-123/proxies.txt ./proxies.txt
          
          # Здесь будет логика фильтрации
          # Пока просто перезаписываем тем же файлом
          aws s3 cp ./proxies.txt s3://my-proxy-list-my-proxy-list-123/proxies.txt
